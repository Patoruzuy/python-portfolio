name: Code Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff bandit
        
    - name: Lint with ruff
      run: |
        ruff check app/ tests/ scripts/ wsgi.py
        
    - name: Security check with Bandit
      run: |
        bandit -r app/ scripts/ -ll -i
        
    - name: Test module imports
      run: |
        python -c "from app import app as flask_app; from app import admin_routes, models; from app.utils import analytics_utils; print('✅ All modules load successfully')"
        
    - name: Run tests (if available)
      run: |
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=app --cov-report=html --cov-report=term
        else
          echo "No tests directory found, skipping tests"
        fi
      continue-on-error: true
